    <circle cx="230" cy="170" r="10" fill="white" opacity="0.9" />
    <circle cx="242" cy="194" r="8" fill="white" opacity="0.65" />
    <circle cx="252" cy="216" r="6" fill="white" opacity="0.4" />
    <circle cx="258" cy="236" r="4" fill="white" opacity="0.2" />
  </g>

  <g transform="translate(0, 560)">
