  <line x1="350" y1="720" x2="650" y2="720" stroke="#262626" stroke-width="2" stroke-linecap="round" />
  
  <text x="500" y="780" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="26" fill="#737373" letter-spacing="4">SOUND • LIGHTING • STUDIO • GEAR</text>
